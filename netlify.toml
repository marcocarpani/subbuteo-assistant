[build]
  base    = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA routing
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Header critici per Service Worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control             = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed    = "/"

[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Header per manifest
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type  = "application/manifest+json"
    Cache-Control = "no-cache"

# Header per icone
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CORS per PWABuilder
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    X-Frame-Options             = "SAMEORIGIN"
    X-Content-Type-Options      = "nosniff"
